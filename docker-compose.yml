version: "3.8"

services:
  web:
    image: php:8.2-apache
    container_name: mini_dvwa_web
    ports:
      - "8080:80"
    volumes:
      - ./web:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:5.7
    container_name: mini_dvwa_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blogdb
    volumes:
      - ./db:/docker-entrypoint-initdb.d
